# =============================================================================
# Grafana Helm Values — Dashboard & Visualization
# Pre-configured with Loki datasource for instant log querying.
# Optimized for single-node AKS (B2s) with minimal resources.
# =============================================================================

replicas: 1

# Admin credentials (password overridden via Terraform set_sensitive when provided)
adminUser: admin
adminPassword: admin

# Service
service:
  type: ClusterIP
  port: 80

# Persistence — keep dashboards/settings across restarts
persistence:
  enabled: true
  size: 1Gi

# Resources — minimal footprint for B2s node
resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 250m
    memory: 256Mi

# Pre-provision Prometheus, Alertmanager, and Loki as datasources (available immediately on first login)
datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090
        isDefault: true
        jsonData:
          timeInterval: "30s"
      - name: Alertmanager
        type: alertmanager
        access: proxy
        url: http://kube-prometheus-stack-alertmanager.monitoring.svc.cluster.local:9093
        isDefault: false
        jsonData:
          implementation: prometheus
      - name: Loki
        type: loki
        access: proxy
        url: http://loki.monitoring.svc.cluster.local:3100
        isDefault: false
        jsonData:
          maxLines: 1000

# Ingress disabled — managed by Terraform kubernetes_ingress_v1 resource
ingress:
  enabled: false

# Sidecar for dashboard auto-discovery (optional, disabled to save resources)
sidecar:
  dashboards:
    enabled: false

# Pre-provision community dashboards via Grafana.com (loaded on startup)
dashboardProviders:
  dashboardproviders.yaml:
    apiVersion: 1
    providers:
      - name: default
        orgId: 1
        folder: "Kubernetes"
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards/default

dashboards:
  default:
    # Kubernetes cluster overview (nodes, pods, CPU/memory) — Prometheus datasource
    kubernetes-cluster-overview:
      gnetId: 15661
      revision: 1
      datasource: Prometheus
    # Node exporter full dashboard — detailed host metrics
    node-exporter-full:
      gnetId: 1860
      revision: 37
      datasource: Prometheus
    # Loki log volume — log ingestion rates and volume by namespace/pod
    loki-log-volume:
      gnetId: 13407
      revision: 1
      datasource: Prometheus
    # Blackbox Exporter — HTTP probe uptime, latency, and status codes
    blackbox-exporter:
      gnetId: 7587
      revision: 3
      datasource: Prometheus

# Grafana.ini overrides
grafana.ini:
  server:
    root_url: "%(protocol)s://%(domain)s/"
  analytics:
    reporting_enabled: false
    check_for_updates: false
  log:
    mode: console
    level: warn
